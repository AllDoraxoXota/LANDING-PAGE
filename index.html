<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Landing Page Simples</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="landing-pai">

      <section class="lado-esquerdo">

        <header class="logo-area">
        <img>
          <h1>Curso do Chef Tony</h1>
        </header>

        <article class="content">
          <p class="subtitle">Aprenda grandes receitas</p>
          <h2>Ganhe o melhor<br />treinamento culinário!</h2>
          <p class="texto">
            Um curso prático para aprender receitas novas ou para melhorar suas habilidades culinárias com o Chef Tony
          </p>
        </article>

        <form class="dados">
          <input type="text" placeholder="Seu Nome" />
          <input type="email" placeholder="Seu Telefone" />
          <button type="submit">MATRICULAR-SE</button>
        </form>
      </section>

      <section class="lado-direito">
        <img class="coz" src="chef-cartoon-profession-by-Vexels.png" alt="pessoa" />
      </section>
    </main>
  </body>
</html>
